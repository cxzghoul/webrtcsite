<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamRoom | Продвинутая Платформа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-darkest: #0b0c10; --bg-main: #1f2833; --bg-card: #151a21; --bg-input: #242c37;
            --accent: #45f3ff; --accent-purple: #8a2be2; --text-main: #c5c6c7; --text-white: #ffffff;
            --text-muted: #667894; --success: #02f78e; --danger: #eb4034;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-darkest); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-card); }
        ::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 4px; }

        /* Окно Аутентификации */
        #auth-screen { margin: auto; background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 100%; max-width: 420px; text-align: center; }
        #auth-screen h2 { color: var(--text-white); font-weight: 700; margin-bottom: 8px; font-size: 26px; }
        #auth-screen p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        
        .input-group { position: relative; margin-bottom: 16px; }
        input { width: 100%; padding: 14px 16px; border-radius: 8px; border: 2px solid transparent; background: var(--bg-input); color: #fff; font-size: 14px; outline: none; transition: all 0.2s; }
        input:focus { border-color: var(--accent); }
        
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent-purple), #4d0099); border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.1s; }
        button:active { transform: scale(0.98); }

        .auth-toggle { margin-top: 16px; font-size: 13px; color: var(--text-muted); cursor: pointer; display: inline-block; }
        .auth-toggle span { color: var(--accent); text-decoration: underline; }

        /* Выбор комнаты (Появляется после логина) */
        #room-select-section { display: none; }

        .room-section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; text-align: left; }
        .room-list { list-style: none; max-height: 120px; overflow-y: auto; text-align: left; margin-bottom: 15px; }
        .room-list li { background: var(--bg-input); padding: 10px 12px; margin-bottom: 6px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border: 1px solid transparent; }
        .room-list li:hover { border-color: var(--accent); }
        .room-list li span { color: var(--text-white); font-weight: 500; }

        /* Главный интерфейс */
        #main-container { display: none; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease; }
        
        #video-section { flex: 3; display: flex; flex-direction: column; background: #090a0f; position: relative; }
        .video-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .controls { height: 75px; background: var(--bg-card); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-top: 1px solid rgba(255,255,255,0.05); }
        .controls-buttons { display: flex; gap: 12px; }
        
        #share-btn { width: auto; padding: 12px 24px; background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000; font-weight: 700; display: none; }
        #delete-btn { width: auto; padding: 12px 24px; background: var(--danger); color: #fff; font-weight: 600; display: none; }
        
        #status-node { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; color: var(--text-white); }
        #status-node::before { content: ''; display: inline-block; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; }
        #status-node.active::before { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* Консоль админа (генерируется динамически скриптом) */
        .admin-console { height: 160px; background: #07080c; color: #a1a1a1; font-family: 'Courier New', monospace; padding: 15px; overflow-y: auto; font-size: 12px; border-top: 1px solid #1a1f29; box-sizing: border-box; }
        
        /* Чат */
        #chat-section { flex: 1; max-width: 400px; min-width: 320px; background: var(--bg-card); border-left: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .chat-header { padding: 20px; font-weight: 700; color: var(--text-white); border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 16px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { background: var(--bg-input); padding: 12px; border-radius: 8px; border-bottom-left-radius: 2px; max-width: 90%; width: max-content; min-width: 120px; }
        .msg-meta { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 4px; font-size: 11px; font-weight: 600; }
        .msg-meta .nick { color: var(--accent); }
        .msg-meta .time { color: var(--text-muted); }
        .msg .text { color: var(--text-white); font-size: 13px; line-height: 1.4; word-break: break-word; }
        .msg.system { background: transparent; color: var(--text-muted); font-style: italic; font-size: 12px; padding: 4px 0; max-width: 100%; }

        #chat-input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        #chat-input-area input { margin: 0; }
        #chat-input-area button { width: 52px; height: 48px; background: var(--bg-input); border: 1px solid rgba(255,255,255,0.05); color: #fff; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div id="credentials-section">
            <h2 id="auth-title">Авторизация</h2>
            <p id="auth-desc">Введите свои данные для доступа к платформе</p>
            
            <div class="input-group"><input type="text" id="auth-username" placeholder="Имя пользователя"></div>
            <div class="input-group"><input type="password" id="auth-password" placeholder="Пароль"></div>
            
            <button id="auth-submit-btn" onclick="handleAuthSubmit()">Войти в аккаунт</button>
            <div class="auth-toggle" id="auth-toggle-mode" onclick="toggleAuthMode()">Еще нет аккаунта? <span>Регистрация</span></div>
        </div>

        <div id="room-select-section">
            <h2>StreamRoom</h2>
            <p>Добро пожаловать, <span id="user-greeting" style="color:var(--accent)"></span>!</p>
            
            <div class="input-group"><input type="text" id="room-id-input" placeholder="Идентификатор комнаты"></div>
            <div class="input-group"><input type="password" id="room-pass-input" placeholder="Пароль от комнаты (необязательно)"></div>
            <button onclick="handleJoinRoom()">Войти / Создать комнату</button>
            
            <div class="room-section-title">Недавно посещенные</div>
            <ul id="rooms-history" class="room-list"></ul>

            <div class="room-section-title">Активные публичные комнаты</div>
            <ul id="public-rooms" class="room-list"></ul>
        </div>
    </div>

    <div id="main-container">
        <div id="video-section">
            <div class="video-wrapper">
                <video id="remote-video" autoplay playsinline controls></video>
            </div>
            <div class="controls">
                <div id="status-node">Инициализация...</div>
                <div class="controls-buttons">
                    <button id="share-btn" onclick="startScreenShare()">Трансляция экрана</button>
                    <button id="delete-btn" onclick="deleteRoom()">Удалить комнату</button>
                </div>
            </div>
            </div>
        
        <div id="chat-section">
            <div class="chat-header">Чат трансляции</div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="msg-input" placeholder="Введите сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">⚡</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
